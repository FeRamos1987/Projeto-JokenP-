<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevClub JokenPô</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>JokenPô</h1>
       
        <p id="resultado">Faça sua jogada:</p>
       
        <div class="buttons">
            <button id="rock">&#x1F44A;</button>
            <button id="paper">&#x1F590;</button>
            <button id="scissors">&#x270C;</button>
        </div>

        <p class="your score">Sua Pontuação: <span id="user-score">0</span> </p>
        <p class="alexa score">Pontuação da Alexa: <span id="alexa-score">0</span> </p>

        <div><button id="reset">Reset Score</button></div>
        
    </div>
    <script src="script.js"></script>
</body>
</html>
